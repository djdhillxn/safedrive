# Tiny config to check installation and script wiring quickly.
experiment:
  name: smoke_test
  output_dir: runs
  seed: 0
  tensorboard: false
  latest_name: smoke

train:
  total_timesteps: 512
  n_envs: 1
  vec_env: dummy
  progress_bar: true
  normalize_obs: true
  normalize_reward: false
  checkpoint_freq: 256
  eval_freq: 256
  eval_episodes: 2

algorithm:
  name: ppo
  policy: MlpPolicy
  kwargs:
    device: cpu
    learning_rate: 0.0003
    n_steps: 128
    batch_size: 64
    n_epochs: 2
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    verbose: 0

metadrive:
  use_render: false
  log_level: 50
  map: 3
  num_scenarios: 2
  start_seed: 0
  traffic_density: 0.0
  random_traffic: false
  random_spawn_lane_index: false
  horizon: 300
  discrete_action: false
  accident_prob: 0.0

eval:
  start_seed: 100
  num_scenarios: 2
  traffic_density: 0.0
  episodes: 2
  deterministic: true
  progress: true
  vec_env: subproc

logging:
  console_level: INFO
  file_level: DEBUG
