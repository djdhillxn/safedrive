# Phase-2 staged road-geometry curriculum.
# The total budget and final task match sac_phase2_direct.yaml exactly.
experiment:
  name: sac_phase2_curriculum
  phase: phase2
  latest_name: sac_phase2_curriculum_seed{seed}
  baseline_latest_prefix: phase2
  output_dir: runs
  seed: 0
  tensorboard: true

train:
  total_timesteps: 500000
  n_envs: 1
  vec_env: dummy
  progress_bar: true
  normalize_obs: false
  normalize_reward: false
  checkpoint_freq: 50000
  diagnostic_freq: 10000
  eval_freq: 25000
  save_replay_buffer: true

algorithm:
  name: sac
  policy: MlpPolicy
  kwargs:
    device: auto
    learning_rate: 0.0003
    buffer_size: 250000
    learning_starts: 10000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    train_freq: 1
    gradient_steps: 1
    ent_coef: 0.05
    target_update_interval: 1
    # Match direct SAC and preserve correct time-limit targets across stage resumes.
    optimize_memory_usage: false
    replay_buffer_kwargs:
      handle_timeout_termination: true
    verbose: 0
    policy_kwargs:
      net_arch: [256, 256]

metadrive:
  use_render: false
  log_level: 50
  map: 3
  num_scenarios: 100
  start_seed: 10000
  sequential_seed: true
  traffic_density: 0.0
  random_traffic: false
  random_spawn_lane_index: false
  horizon: 1000
  truncate_as_terminate: false
  discrete_action: false
  success_reward: 10.0
  out_of_road_penalty: 5.0
  crash_vehicle_penalty: 5.0
  crash_object_penalty: 5.0
  crash_sidewalk_penalty: 5.0
  driving_reward: 1.0
  speed_reward: 0.1
  use_lateral_reward: false
  crash_vehicle_done: true
  out_of_road_done: true
  crash_object_done: true
  accident_prob: 0.0
  reward_shaping: {}

validation:
  start_seed: 20000
  num_scenarios: 25
  map: 3
  traffic_density: 0.0
  random_traffic: false
  random_spawn_lane_index: false
  episodes: 25
  deterministic: true
  progress: false
  vec_env: subproc

test:
  start_seed: 30000
  num_scenarios: 100
  map: 3
  traffic_density: 0.0
  random_traffic: false
  random_spawn_lane_index: false
  episodes: 100
  deterministic: true
  progress: true
  vec_env: subproc

curriculum:
  total_timesteps: 500000
  stages:
    - name: curve
      max_timesteps: 100000
      require_gate: true
      metadrive:
        map: C
        num_scenarios: 25
      validation:
        map: C
        num_scenarios: 25
        episodes: 25
      gate:
        success_rate: 0.90
        route_completion: 0.90
        max_collision_rate: 0.10
        max_out_of_road_rate: 0.10
        max_timeout_rate: 0.10
    - name: straight_curve
      max_timesteps: 150000
      require_gate: true
      metadrive:
        map: SC
        num_scenarios: 50
      validation:
        map: SC
        num_scenarios: 25
        episodes: 25
      gate:
        success_rate: 0.90
        route_completion: 0.90
        max_collision_rate: 0.10
        max_out_of_road_rate: 0.10
        max_timeout_rate: 0.10
    - name: procedural
      use_remaining_timesteps: true
      require_gate: false
      metadrive:
        map: 3
        num_scenarios: 100
      validation:
        map: 3
        num_scenarios: 25
        episodes: 25
      gate:
        success_rate: 0.80
        route_completion: 0.90
        max_collision_rate: 0.10
        max_out_of_road_rate: 0.10
        max_timeout_rate: 0.10

logging:
  console_level: INFO
  file_level: DEBUG
