# Phase-1 PPO baseline for SafeRL-Drive / MetaDrive MVP.
# Designed to run on a laptop first. Increase total_timesteps for a stronger run.
experiment:
  name: ppo_mvp
  output_dir: runs
  seed: 0
  tensorboard: true

train:
  total_timesteps: 500000
  n_envs: 4
  vec_env: subproc        # Use dummy only together with n_envs: 1.
  progress_bar: true
  normalize_obs: true
  normalize_reward: false
  checkpoint_freq: 100000
  eval_freq: 50000
  eval_episodes: 20

algorithm:
  name: ppo
  policy: MlpPolicy
  kwargs:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.001
    vf_coef: 0.5
    max_grad_norm: 0.5
    verbose: 0
    policy_kwargs:
      net_arch: [256, 256]

metadrive:
  # Core single-agent procedural driving setup.
  use_render: false
  log_level: 50
  map: 5
  num_scenarios: 50
  start_seed: 0
  traffic_density: 0.10
  random_traffic: true
  random_spawn_lane_index: true
  horizon: 1000
  discrete_action: false
  # Keep dense progress reward, but make terminal outcomes matter and reward lane keeping.
  success_reward: 50.0
  out_of_road_penalty: 20.0
  crash_vehicle_penalty: 20.0
  crash_object_penalty: 20.0
  crash_sidewalk_penalty: 20.0
  driving_reward: 1.0
  speed_reward: 0.05
  use_lateral_reward: true
  crash_vehicle_done: true
  out_of_road_done: true
  crash_object_done: true
  accident_prob: 0.0

eval:
  # Unseen seeds: intentionally disjoint from training seeds [0, 49].
  start_seed: 1000
  num_scenarios: 50
  traffic_density: 0.10
  episodes: 50
  deterministic: true
  progress: true
  vec_env: subproc

logging:
  console_level: INFO
  file_level: DEBUG
