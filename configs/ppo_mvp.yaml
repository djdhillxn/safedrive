# Phase-1 PPO baseline for SafeRL-Drive / MetaDrive MVP.
# Designed to run on a laptop first. Increase total_timesteps for a stronger run.
experiment:
  name: ppo_mvp
  output_dir: runs
  seed: 0
  tensorboard: true

train:
  total_timesteps: 500000
  n_envs: 4
  vec_env: subproc        # dummy | subproc; use dummy for debugging on Mac if subproc has issues
  normalize_obs: true
  normalize_reward: false
  checkpoint_freq: 100000
  eval_freq: 50000
  eval_episodes: 10

algorithm:
  name: ppo
  policy: MlpPolicy
  kwargs:
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
    verbose: 1

metadrive:
  # Core single-agent procedural driving setup.
  use_render: false
  log_level: 50
  map: 5
  num_scenarios: 50
  start_seed: 0
  traffic_density: 0.10
  random_traffic: true
  random_spawn_lane_index: true
  horizon: 1000
  discrete_action: false
  # Reward/termination defaults are close to MetaDrive defaults, stated explicitly for clarity.
  success_reward: 10.0
  out_of_road_penalty: 5.0
  crash_vehicle_penalty: 5.0
  crash_object_penalty: 5.0
  driving_reward: 1.0
  speed_reward: 0.1
  use_lateral_reward: false
  crash_vehicle_done: true
  out_of_road_done: true
  crash_object_done: true
  accident_prob: 0.0

eval:
  # Unseen seeds: intentionally disjoint from training seeds [0, 49].
  start_seed: 1000
  num_scenarios: 50
  traffic_density: 0.10
  episodes: 50
  deterministic: true
