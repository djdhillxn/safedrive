# Phase-1 discrete-control PPO benchmark.
# Scope: learn reliable lane following on one straight, traffic-free road before
# attempting curves, procedural maps, or traffic.
experiment:
  name: ppo_mvp
  output_dir: runs
  seed: 0
  tensorboard: true

train:
  total_timesteps: 100000
  n_envs: 4
  vec_env: subproc
  progress_bar: true
  normalize_obs: false
  normalize_reward: false
  checkpoint_freq: 25000
  diagnostic_freq: 5000
  eval_freq: 25000
  # Stop only after the qualifying checkpoint has been saved.
  stop_success_rate: 0.80
  stop_route_completion: 0.90
  stop_max_collision_rate: 0.10
  stop_max_out_of_road_rate: 0.10
  stop_max_timeout_rate: 0.10

algorithm:
  name: ppo
  policy: MlpPolicy
  kwargs:
    device: cpu
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 256
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
    target_kl: 0.03
    verbose: 0
    policy_kwargs:
      net_arch: [256, 256]

metadrive:
  use_render: false
  log_level: 50
  map: S
  num_scenarios: 1
  start_seed: 0
  traffic_density: 0.0
  random_traffic: false
  random_spawn_lane_index: false
  horizon: 500
  # The horizon is an artificial time limit, so value learning may bootstrap.
  truncate_as_terminate: false
  # MetaDrive's documented beginner PPO setup uses a compact 3 x 3 action grid.
  # This proves policy learning before continuous steering becomes an extension.
  discrete_action: true
  use_multi_discrete: true
  discrete_steering_dim: 3
  discrete_throttle_dim: 3
  # Start from MetaDrive's documented reference reward. Safety is measured by
  # outcome metrics; custom shaping returns only after basic learning is proven.
  success_reward: 10.0
  out_of_road_penalty: 5.0
  crash_vehicle_penalty: 5.0
  crash_object_penalty: 5.0
  crash_sidewalk_penalty: 5.0
  driving_reward: 1.0
  speed_reward: 0.1
  use_lateral_reward: false
  crash_vehicle_done: true
  out_of_road_done: true
  crash_object_done: true
  accident_prob: 0.0
  reward_shaping: {}

validation:
  start_seed: 1000
  num_scenarios: 10
  map: S
  traffic_density: 0.0
  random_traffic: false
  random_spawn_lane_index: false
  episodes: 10
  deterministic: true
  progress: false
  vec_env: subproc

test:
  # Seeds 3000--3019 were consumed by the local diagnosis.
  start_seed: 4000
  num_scenarios: 20
  map: S
  traffic_density: 0.0
  random_traffic: false
  random_spawn_lane_index: false
  episodes: 20
  deterministic: true
  progress: true
  vec_env: subproc

logging:
  console_level: INFO
  file_level: DEBUG
