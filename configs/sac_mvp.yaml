# Phase-1 SAC baseline for SafeRL-Drive / MetaDrive MVP.
# SAC is off-policy and usually more sample efficient, but wall-clock behavior depends on hardware.
experiment:
  name: sac_mvp
  output_dir: runs
  seed: 0
  tensorboard: true

train:
  total_timesteps: 500000
  n_envs: 1               # SAC can use VecEnv, but 1 env keeps replay-buffer semantics simple.
  vec_env: dummy
  progress_bar: true
  normalize_obs: true
  normalize_reward: false
  checkpoint_freq: 100000
  eval_freq: 50000
  eval_episodes: 20

algorithm:
  name: sac
  policy: MlpPolicy
  kwargs:
    learning_rate: 0.0003
    buffer_size: 300000
    learning_starts: 10000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    train_freq: 1
    gradient_steps: 1
    ent_coef: auto
    target_update_interval: 1
    verbose: 0
    policy_kwargs:
      net_arch: [256, 256]

metadrive:
  use_render: false
  log_level: 50
  map: 5
  num_scenarios: 50
  start_seed: 0
  traffic_density: 0.10
  random_traffic: true
  random_spawn_lane_index: true
  horizon: 1000
  discrete_action: false
  success_reward: 50.0
  out_of_road_penalty: 20.0
  crash_vehicle_penalty: 20.0
  crash_object_penalty: 20.0
  crash_sidewalk_penalty: 20.0
  driving_reward: 1.0
  speed_reward: 0.05
  use_lateral_reward: true
  crash_vehicle_done: true
  out_of_road_done: true
  crash_object_done: true
  accident_prob: 0.0

eval:
  start_seed: 1000
  num_scenarios: 50
  traffic_density: 0.10
  episodes: 50
  deterministic: true
  progress: true
  vec_env: subproc

logging:
  console_level: INFO
  file_level: DEBUG
